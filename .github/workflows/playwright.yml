name: Playwright Automation

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  playwright:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        
      - name: Install dependencies
        run: |
              python -m pip install --upgrade pip
              pip install -r requirements.txt

      - name: Install Playwright Browsers
        run: python -m playwright install --with-deps
      

      - name: Run Tests
        env:
          QASE_MODE: testops
          QASE_DEBUG: "true"
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TESTOPS_API_TOKEN }}
          QASE_TESTOPS_PROJECT: ${{ secrets.QASE_TESTOPS_PROJECT }}
        run: >
          pytest tests/
          --alluredir=allure-results
          --json-report
          --json-report-file=report.json

      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
      
          subject: Automation Test Report - ${{ job.status }}
      
          to: rdlipika16@gmail.com,rahul@everflourish.in
      
          from: GitHub Actions <${{ secrets.EMAIL_USERNAME }}>
      
          html_body: file://reports/mail.html
                
